[tool.black]
line-length = 100
target-version = ["py312"]

[tool.isort]
profile = "black"
line_length = 100

[tool.ruff]
target-version = "py312"
line-length = 100
exclude = ["*/migrations/*"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "DJ"]

[tool.pytest.ini_options]
DJANGO_SETTINGS_MODULE = "config.settings"
python_files = ["test_*.py", "*_tests.py", "tests.py"]
addopts = "--strict-markers --disable-warnings --cov=. --cov-report=term-missing --cov-fail-under=20"
testpaths = ["tests", "accounts", "alerts", "devices", "refills", "telemetry"]
