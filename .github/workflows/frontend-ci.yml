name: Frontend CI

on:
  pull_request:
    paths: ["apps/frontend/**", "packages/shared/**", "package.json", "package-lock.json", ".github/workflows/frontend-ci.yml"]
  push:
    branches: [main]
    paths: ["apps/frontend/**", "packages/shared/**", "package.json", "package-lock.json", ".github/workflows/frontend-ci.yml"]

permissions:
  contents: read

concurrency:
  group: frontend-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
