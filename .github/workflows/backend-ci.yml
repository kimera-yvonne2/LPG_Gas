name: Backend CI

on:
  pull_request:
    paths: ["apps/backend/**", ".github/workflows/backend-ci.yml"]
  push:
    branches: [main]
    paths: ["apps/backend/**", ".github/workflows/backend-ci.yml"]

permissions:
  contents: read

concurrency:
  group: backend-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: lpg_guardian_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres -d lpg_guardian_test"
          --health-interval 5s --health-timeout 5s --health-retries 10
      redis:
        image: redis:7.4-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping" --health-interval 5s --health-timeout 3s --health-retries 10
    defaults:
      run:
        working-directory: apps/backend
    env:
      DJANGO_SECRET_KEY: ci-only-secret-key
      DJANGO_DEBUG: "false"
      DJANGO_ALLOWED_HOSTS: localhost
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/lpg_guardian_test
      CELERY_BROKER_URL: redis://localhost:6379/0
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: apps/backend/requirements*.txt
      - run: pip install -r requirements-dev.txt
      - run: ruff check .
      - run: black --check .
      - run: isort --check-only .
      - run: pytest
      - run: python manage.py makemigrations --check --dry-run
      - run: python manage.py check --deploy
