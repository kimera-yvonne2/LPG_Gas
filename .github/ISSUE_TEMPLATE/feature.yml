name: Feature
description: Propose a scoped product or platform capability
title: "feat: "
labels: ["type: feature", "status: triage"]
body:
  - type: textarea
    id: description
    attributes: { label: Description, description: Explain the problem and desired outcome. }
    validations: { required: true }
  - type: textarea
    id: acceptance
    attributes: { label: Acceptance criteria, description: Provide observable, testable criteria. }
    validations: { required: true }
  - type: textarea
    id: technical
    attributes: { label: Technical notes, description: Constraints, interfaces, security, and observability considerations. }
  - type: dropdown
    id: difficulty
    attributes: { label: Estimated difficulty, options: [Small, Medium, Large] }
    validations: { required: true }
  - type: input
    id: dependencies
    attributes: { label: Dependencies, description: Link blocking issues or write None. }
    validations: { required: true }
