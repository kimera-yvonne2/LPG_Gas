name: ${COMPOSE_PROJECT_NAME:-lpg-guardian}

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-lpg_guardian}
      POSTGRES_USER: ${POSTGRES_USER:-lpg_guardian}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-local-development-only}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lpg_guardian} -d ${POSTGRES_DB:-lpg_guardian}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./apps/backend
      target: development
    command: ./scripts/entrypoint.sh python manage.py runserver 0.0.0.0:8000
    env_file: ./apps/backend/.env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-lpg_guardian}:${POSTGRES_PASSWORD:-local-development-only}@postgres:5432/${POSTGRES_DB:-lpg_guardian}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ./apps/backend:/app
    depends_on:
      postgres: { condition: service_healthy }

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
      target: development
    command: npm --workspace @lpg-guardian/frontend run dev -- --hostname 0.0.0.0
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000/api/v1}
      WATCHPACK_POLLING: "true"
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    volumes:
      - ./apps/frontend:/workspace/apps/frontend
      - ./packages/shared:/workspace/packages/shared
      - frontend_node_modules:/workspace/node_modules
    depends_on:
      backend: { condition: service_started }

volumes:
  postgres_data:
  frontend_node_modules:
